<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Preferences</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fdf8f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0d8cc;
      border-radius: 4px;
      max-width: 560px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      margin-bottom: 8px;
      color: #222;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .contact-name { font-weight: bold; color: #333; }

    .brand-section {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid #e8e0d4;
      border-radius: 3px;
      background: #fdfaf5;
    }

    .brand-logo {
      display: block;
      height: 72px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 14px;
    }

    .consent-row { display: flex; align-items: center; gap: 10px; }

    .consent-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #6b5c3e;
      flex-shrink: 0;
    }

    .consent-row label {
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 28px;
      background: #6b5c3e;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover:not(:disabled) { background: #554930; }
    .btn:disabled { background: #aaa; cursor: default; }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 3px;
      font-size: 0.9rem;
      display: none;
    }

    .message.success {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
      display: block;
    }

    .message.error {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #c62828;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<div class="card">

  <script>
    // Calls Netlify proxy functions — no CORS issues
    const GET_URL  = '/.netlify/functions/get-consent';
    const POST_URL = '/.netlify/functions/submit-consent';

    const BRANDS = [
      { id: 'corsica',    label: 'Corsican Places',          logo: '/logo-corsica.png',    param: 'corsica_email' },
      { id: 'goa',        label: 'The Goa Experience',              logo: '/logo-goa.png',        param: 'goa_email' },
      { id: 'cape_verde', label: 'The Cape Verde Experience',        logo: '/logo-cape-verde.png', param: 'cape_verde_email' },
      { id: 'gambia',     label: 'The Gambia Experience',        logo: '/logo-gambia.png',     param: 'gambia_email' },
      { id: 'sardinia',   label: 'Sardinian Places',  logo: '/logo-sardinia.png',   param: 'sardinia_email' }
    ];
  </script>

  <div id="loading" class="loading">Loading your preferences&hellip;</div>

  <div id="form-content" style="display:none;">
    <h1>Your Marketing Preferences</h1>
    <p class="subtitle">
      Hello <span id="contact-name" class="contact-name"></span>. Please tick the
      brands you would like to hear from by email, then click Save.
    </p>
    <div id="brands-container"></div>
    <button class="btn" id="save-btn" onclick="savePreferences()">Save Preferences</button>
    <div class="message" id="message"></div>
  </div>

  <div id="error-content" style="display:none;">
    <h1>Unable to load preferences</h1>
    <p class="subtitle" id="error-detail">Please check the link you were sent and try again.</p>
  </div>

</div>

<script>
  function getContactId() {
    return new URLSearchParams(window.location.search).get('contact_id') || '';
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-detail').textContent = msg;
    document.getElementById('error-content').style.display = 'block';
  }

  function showForm(data) {
    document.getElementById('loading').style.display = 'none';
    var name = [data.first_name, data.last_name].filter(Boolean).join(' ') || 'there';
    document.getElementById('contact-name').textContent = name;

    var container = document.getElementById('brands-container');
    container.innerHTML = '';
    BRANDS.forEach(function(brand) {
      var isChecked = data[brand.param] === true || data[brand.param] === 'true';
      var section = document.createElement('div');
      section.className = 'brand-section';
      section.innerHTML =
        '<img class="brand-logo" src="' + brand.logo + '" alt="' + brand.label + '" />' +
        '<div class="consent-row">' +
          '<input type="checkbox" id="cb_' + brand.id + '" ' + (isChecked ? 'checked' : '') + ' />' +
          '<label for="cb_' + brand.id + '">I\'d like to receive email marketing from ' + brand.label + '</label>' +
        '</div>';
      container.appendChild(section);
    });

    document.getElementById('form-content').style.display = 'block';
  }

  function setMessage(type, text) {
    var el = document.getElementById('message');
    el.className = 'message ' + type;
    el.textContent = text;
  }

  async function loadPreferences() {
    var contactId = getContactId();
    if (!contactId) {
      showError('No contact ID found in the URL. Please use the link provided in your email.');
      return;
    }
    try {
      var res  = await fetch(GET_URL + '?contact_id=' + encodeURIComponent(contactId));
      var data = await res.json();
      if (data.status === 'error') {
        showError(data.message || 'Could not load your preferences. Please try again later.');
      } else {
        showForm(data);
      }
    } catch (err) {
      showError('Network error — please check your connection and try again.');
      console.error(err);
    }
  }

  async function savePreferences() {
    var contactId = getContactId();
    var btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    var body = { contact_id: contactId };
    BRANDS.forEach(function(brand) {
      var cb = document.getElementById('cb_' + brand.id);
      body[brand.param] = cb ? String(cb.checked) : 'false';
    });

    try {
      var res  = await fetch(POST_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      var data = await res.json();
      if (data.status === 'error') {
        setMessage('error', data.message || 'Something went wrong. Please try again.');
      } else {
        setMessage('success', 'Your preferences have been saved. Thank you!');
      }
    } catch (err) {
      setMessage('error', 'Network error — please check your connection and try again.');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Preferences';
    }
  }

  loadPreferences();
</script>

</body>
</html>
