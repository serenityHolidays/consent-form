<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Preferences</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fdf8f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0d8cc;
      border-radius: 4px;
      max-width: 560px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      margin-bottom: 8px;
      color: #222;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .contact-name { font-weight: bold; color: #333; }

    .brand-section {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid #e8e0d4;
      border-radius: 3px;
      background: #fdfaf5;
    }

    .brand-logo {
      display: block;
      height: 72px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      border-radius: 6px;
      margin-bottom: 14px;
    }

    .consent-row { display: flex; align-items: center; gap: 10px; }

    .consent-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #6b5c3e;
      flex-shrink: 0;
    }

    .consent-row label {
      font-size: 0.9rem;
      color: #555;
      cursor: pointer;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 28px;
      background: #6b5c3e;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover:not(:disabled) { background: #554930; }
    .btn:disabled { background: #aaa; cursor: default; }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 3px;
      font-size: 0.9rem;
      display: none;
    }

    .message.success {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
      display: block;
    }

    .message.error {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #c62828;
      display: block;
    }

    .prefs-section {
      margin-top: 28px;
      padding: 20px;
      border: 1px solid #e8e0d4;
      border-radius: 3px;
      background: #fdfaf5;
    }

    .prefs-title {
      font-size: 1rem;
      font-weight: bold;
      color: #444;
      margin-bottom: 4px;
    }

    .prefs-subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 14px;
    }

    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip { cursor: pointer; }

    .chip input[type="checkbox"] {
      display: none;
    }

    .chip span {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid #c8b99a;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #555;
      background: #fff;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .chip input:checked + span {
      background: #6b5c3e;
      color: #fff;
      border-color: #6b5c3e;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 0.95rem;
    }
  </style>
</head>
